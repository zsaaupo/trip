{% extends "base.html" %}
{% block title %}Forgot password — Make a trip{% endblock %}

{% block content %}
<div class="container">
  <div class="auth-card">
    <h1>Reset your password</h1>
    <p class="subtext">Enter your account email and we'll send you a reset code.</p>

    <form id="forgot-form">
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" required>
      </div>
      <button type="submit" class="btn btn--primary btn--block" id="submit-btn">Send reset code</button>
    </form>

    <p class="switch-link"><a href="{% url 'page-login' %}">Back to log in</a></p>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.getElementById('forgot-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  const email = document.getElementById('email').value.trim();

  btn.disabled = true; btn.textContent = 'Sending...';
  try {
    const data = await apiRequest('/accounts/password-reset/', { method: 'POST', body: { email } });
    showToast(data.message, 'success');
    setTimeout(() => window.location.href = `/reset-password/?email=${encodeURIComponent(email)}`, 1000);
  } catch (err) {
    showToast(err.message, 'error');
  } finally {
    btn.disabled = false; btn.textContent = 'Send reset code';
  }
});
</script>
{% endblock %}
