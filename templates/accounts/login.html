{% extends "base.html" %}
{% block title %}Log in — Make a trip{% endblock %}

{% block content %}
<div class="container">
  <div class="auth-card">
    <h1>Welcome back</h1>
    <p class="subtext">Log in to manage your bookings.</p>

    <form id="login-form">
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>
      </div>
      <button type="submit" class="btn btn--primary btn--block" id="submit-btn">Log in</button>
    </form>

    <p class="switch-link"><a href="{% url 'page-forgot-password' %}">Forgot your password?</a></p>
    <p class="switch-link">New to Make a trip? <a href="{% url 'page-register' %}">Create an account</a></p>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  btn.disabled = true; btn.textContent = 'Logging in...';
  try {
    const data = await apiRequest('/accounts/login/', { method: 'POST', body: { email, password } });
    showToast(data.message || 'Logged in!', 'success');
    window.location.href = data.is_admin ? '/admin-dashboard/' : '/dashboard/';
  } catch (err) {
    if (err.data && err.data.unverified) {
      showToast('Please verify your email first.', 'error');
      setTimeout(() => window.location.href = `/verify-otp/?email=${encodeURIComponent(email)}`, 1200);
    } else {
      showToast(err.message, 'error');
    }
  } finally {
    btn.disabled = false; btn.textContent = 'Log in';
  }
});
</script>
{% endblock %}
