{% extends "base.html" %}
{% block title %}Set a new password — Make a trip{% endblock %}

{% block content %}
<div class="container">
  <div class="auth-card">
    <h1>Set a new password</h1>
    <p class="subtext">Enter the code we emailed you along with your new password.</p>

    <form id="reset-form">
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" value="{{ email }}" required>
      </div>
      <div class="form-group">
        <label for="otp_code">Reset code</label>
        <input type="text" id="otp_code" name="otp_code" maxlength="6" inputmode="numeric" required>
      </div>
      <div class="form-group">
        <label for="new_password">New password</label>
        <input type="password" id="new_password" name="new_password" required minlength="6">
      </div>
      <button type="submit" class="btn btn--primary btn--block" id="submit-btn">Reset password</button>
    </form>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.getElementById('reset-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  const email = document.getElementById('email').value.trim();
  const otp_code = document.getElementById('otp_code').value.trim();
  const new_password = document.getElementById('new_password').value;

  btn.disabled = true; btn.textContent = 'Resetting...';
  try {
    const data = await apiRequest('/accounts/password-reset/confirm/', { method: 'POST', body: { email, otp_code, new_password } });
    showToast(data.message || 'Password reset!', 'success');
    setTimeout(() => window.location.href = '/login/', 900);
  } catch (err) {
    showToast(err.message, 'error');
  } finally {
    btn.disabled = false; btn.textContent = 'Reset password';
  }
});
</script>
{% endblock %}
